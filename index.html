<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tactix 2 Prototype</title>
  <style>
    @font-face { font-family: 'Iceberg'; src: url('./assets/Fonts/Iceberg/Iceberg-Regular.ttf') format('truetype'); }
    @font-face { font-family: 'Roboto Mono'; src: url('./assets/Fonts/Roboto_Mono/RobotoMono-VariableFont_wght.ttf') format('truetype'); }
    html, body {
      margin: 0;
      padding: 0;
      background: #05070d;
      color: #fff;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Roboto Mono', monospace;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      box-shadow: 0 0 40px rgba(0,0,0,.55);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./main.js"></script>
</body>
</html>
