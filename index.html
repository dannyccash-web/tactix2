<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TACTIX 2 — Turn-Based Combat</title>
  <style>
    @font-face {
      font-family: 'Iceberg';
      src: url('assets/fonts/Iceberg-Regular.ttf') format('truetype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'RobotoMono';
      src: url('assets/fonts/RobotoMono-Regular.ttf') format('truetype');
      font-weight: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Iceberg', monospace;
    }

    #game-container {
      position: relative;
      width: 1280px;
      height: 720px;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* HTML UI layer sits on top of canvas */
    #ui-layer {
      position: absolute;
      top: 0; left: 0;
      width: 1280px;
      height: 720px;
      pointer-events: none;
    }

    /* All UI children handle their own pointer-events */
    #ui-layer * { pointer-events: auto; }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    #loading-title {
      font-family: 'Iceberg', monospace;
      font-size: 48px;
      color: #c8d8e0;
      letter-spacing: 8px;
      margin-bottom: 40px;
    }

    #loading-bar-wrap {
      width: 400px;
      height: 4px;
      background: #1a2530;
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3a7fa0, #60c0e0);
      transition: width 0.1s;
    }

    #loading-label {
      margin-top: 16px;
      font-family: 'RobotoMono', monospace;
      font-size: 12px;
      color: #4a6878;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas" width="1280" height="720"></canvas>
  <div id="ui-layer"></div>

  <div id="loading-screen">
    <div id="loading-title">TACTIX 2</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-label">LOADING ASSETS...</div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/engine.js"></script>
<script src="js/board.js"></script>
<script src="js/game.js"></script>
<script src="js/ai.js"></script>
<script src="js/screens.js"></script>
<script>
  window.addEventListener('load', () => {
    TactixEngine.init();
  });
</script>
</body>
</html>
